---
- name: VMware Host Maintenance Mode Management
  hosts: localhost
  gather_facts: yes
  vars:
    # Python interpreter - use auto_silent or specify path
    # If you get "Failed to import requests" error, either:
    # 1. Install: pip3 install requests pyVmomi pyvim
    # 2. OR override: --extra-vars "ansible_python_interpreter=/usr/bin/python3.11"
    ansible_python_interpreter: "{{ lookup('env', 'ANSIBLE_PYTHON_INTERPRETER') | default('auto_silent', true) }}"
    # VMware ESXi host configuration
    esxi_hostname: "esxi-host.example.com"

    # Auto lookup IP address from vCenter
    # When enabled, looks up vmk0 IP from vCenter and uses it for SSH checks
    autolookupip: false

    # Debug mode - shows detailed vmkernel info (default: false)
    debug_mode: false

    # vCenter configuration
    vcenter_hostname: "vcenter.example.com"
    vcenter_username: "administrator@vsphere.local"
    vcenter_password: "{{ vault_vcenter_password }}"  # Use ansible-vault for security
    vcenter_datacenter: "Datacenter"
    vcenter_cluster: "Cluster"  # Optional: specify cluster name
    vcenter_validate_certs: false  # Set to true if using valid SSL certificates

    # Maintenance mode scheduling
    # Format: "YYYY-MM-DD HH:MM:SS" (24-hour format)
    enter_maintenance_datetime: "2026-07-06 22:00:00"

    # VSAN evacuation mode: "ensureObjectAccessibility" or "evacuateAllData" or "noAction"
    # ensureObjectAccessibility: Minimal data movement, faster (DEFAULT)
    # evacuateAllData: Full data migration, slower but safer
    # noAction: No data evacuation
    vsan_evacuation_mode: "ensureObjectAccessibility"

    # Host action after entering maintenance mode
    # Options: "none", "reboot", "shutdown"
    # "none" - No action, just enter maintenance mode (DEFAULT)
    # "reboot" - Reboot the host after 15 minutes in maintenance mode
    # "shutdown" - Shutdown the host after 15 minutes in maintenance mode
    host_action: "none"

    # Delay before performing host action (in seconds)
    host_action_delay: 900  # 15 minutes

    # Delay after entering maintenance mode (in hours)
    # Only used if host_action is "none"
    post_maintenance_delay_hours: 4

    # Exit maintenance mode scheduling
    # Format: "YYYY-MM-DD HH:MM:SS" (24-hour format)
    exit_maintenance_datetime: "2026-07-07 03:00:00"

    # Timeouts and retries
    ssh_check_timeout: 900  # 15 minutes in seconds
    vcenter_check_timeout: 600  # seconds
    vcenter_reconnect_delay: 900  # 15 minutes in seconds
    exit_maintenance_retry_timeout: 3600  # 1 hour retry window for exiting maintenance mode
    exit_maintenance_retry_delay: 60  # seconds between retry attempts

  tasks:
    - name: Display configuration
      debug:
        msg:
          - "=========================================="
          - "VMware Maintenance Mode Configuration"
          - "=========================================="
          - "ESXi Host: {{ esxi_hostname }}"
          - "vCenter: {{ vcenter_hostname }}"
          - "Datacenter: {{ vcenter_datacenter }}"
          - "Cluster: {{ vcenter_cluster }}"
          - "Enter Maintenance: {{ enter_maintenance_datetime }}"
          - "VSAN Evacuation Mode: {{ vsan_evacuation_mode }}"
          - "Host Action: {{ host_action | upper }}"
          - "{% if host_action != 'none' %}Host Action Delay: {{ host_action_delay }} seconds ({{ (host_action_delay | int / 60) | int }} minutes){% endif %}"
          - "{% if host_action == 'none' %}Post-Maintenance Delay: {{ post_maintenance_delay_hours }} hours{% endif %}"
          - "Exit Maintenance Check: {{ exit_maintenance_datetime }}"
          - "Stabilization Delay Before Exit: {{ vcenter_reconnect_delay }} seconds ({{ (vcenter_reconnect_delay | int / 60) | int }} minutes)"
          - "=========================================="

    - name: "PREREQUISITE CHECK 1: Verify vCenter API connectivity"
      community.vmware.vmware_about_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs }}"
      register: vcenter_precheck
      delegate_to: localhost

    - name: Display vCenter connectivity status
      debug:
        msg:
          - "✓ vCenter API connection to {{ vcenter_hostname }} is working"
          - "  vCenter Version: {{ vcenter_precheck.about_info.version }}"
          - "  Build: {{ vcenter_precheck.about_info.build }}"

    - name: "Verify ESXi host exists in vCenter"
      community.vmware.vmware_host_config_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        validate_certs: "{{ vcenter_validate_certs }}"
      register: host_precheck
      delegate_to: localhost

    - name: Display ESXi host status
      debug:
        msg:
          - "✓ ESXi host {{ esxi_hostname }} found in vCenter"
          - "  Host configuration retrieved successfully"

    - name: Get vmk0 IP address from vCenter (if autolookupip enabled)
      community.vmware.vmware_vmkernel_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        validate_certs: "{{ vcenter_validate_certs }}"
      register: vmkernel_info
      when: autolookupip | bool
      delegate_to: localhost

    - name: Debug vmkernel info structure
      debug:
        var: vmkernel_info
      when:
        - autolookupip | bool
        - debug_mode | bool

    - name: Extract vmk0 IP address
      set_fact:
        esxi_ssh_ip: "{{ item.ipv4_address }}"
      when:
        - autolookupip | bool
        - item.device == 'vmk0'
      loop: "{{ vmkernel_info.host_vmk_info[esxi_hostname] }}"
      loop_control:
        label: "{{ item.device }}"

    - name: Check if vmk0 IP was found
      fail:
        msg: "FAILED: vmk0 interface not found or has no IP address. Disable autolookupip or check ESXi host configuration."
      when:
        - autolookupip | bool
        - esxi_ssh_ip is not defined

    - name: Set SSH target IP
      set_fact:
        esxi_ssh_target: "{{ esxi_ssh_ip | default(esxi_hostname) }}"

    - name: Display SSH target information
      debug:
        msg:
          - "SSH Target: {{ esxi_ssh_target }}"
          - "{% if autolookupip | bool %}Auto-lookup enabled: Using vmk0 IP ({{ esxi_ssh_ip }}) from vCenter{% else %}Using configured hostname{% endif %}"
      when: autolookupip | bool

    - name: "PREREQUISITE CHECK 2: Verify SSH connectivity to ESXi host"
      shell: |
        timeout 30 bash -c "</dev/tcp/{{ esxi_ssh_target }}/22" 2>/dev/null && echo "SUCCESS" || echo "FAILED"
      register: ssh_precheck
      delegate_to: localhost
      changed_when: false
      failed_when: false

    - name: Fail if SSH connection to ESXi host is not available
      fail:
        msg: "FAILED: Cannot connect to SSH port 22 on {{ esxi_ssh_target }}{% if autolookupip | bool %} (vmk0 IP from vCenter){% endif %}. Check network connectivity and SSH service status."
      when: "'FAILED' in ssh_precheck.stdout or ssh_precheck.rc != 0"

    - name: Display SSH connectivity status
      debug:
        msg: "✓ SSH connection to {{ esxi_ssh_target }}:22 is working"

    - name: Display prerequisite check summary
      debug:
        msg:
          - "=========================================="
          - "✓ All prerequisite checks passed"
          - "✓ Ready to begin scheduled maintenance"
          - "=========================================="

    - name: Get current epoch time (for accurate wait calculation)
      shell: date +%s
      register: current_epoch_start
      delegate_to: localhost
      changed_when: false

    - name: Convert maintenance start time to epoch
      shell: date -d "{{ enter_maintenance_datetime }}" +%s
      register: maintenance_start_epoch
      delegate_to: localhost
      changed_when: false

    - name: Calculate seconds until maintenance mode entry
      set_fact:
        seconds_until_maintenance: "{{ (maintenance_start_epoch.stdout | int) - (current_epoch_start.stdout | int) }}"

    - name: Display wait information
      debug:
        msg:
          - "=========================================="
          - "Waiting for Scheduled Maintenance Time"
          - "=========================================="
          - "Current Time: {{ lookup('pipe', 'date +\"%Y-%m-%d %H:%M:%S\"') }}"
          - "Scheduled Start: {{ enter_maintenance_datetime }}"
          - "Seconds to Wait: {{ seconds_until_maintenance }}"
          - "Hours to Wait: {{ (seconds_until_maintenance | int / 3600) | round(2) }}"
          - "Minutes to Wait: {{ (seconds_until_maintenance | int / 60) | round(0) }}"
          - "{% if seconds_until_maintenance | int < 0 %}WARNING: Scheduled time has already passed!{% endif %}"
          - "=========================================="

    - name: Skip wait if time already passed
      debug:
        msg: "Scheduled maintenance time already passed. Entering maintenance mode immediately."
      when: seconds_until_maintenance | int <= 0

    - name: Wait until scheduled maintenance time
      wait_for:
        timeout: "{{ seconds_until_maintenance }}"
      when: seconds_until_maintenance | int > 0
      delegate_to: localhost

    - name: Enter maintenance mode via vCenter API
      vmware.vmware.esxi_maintenance_mode:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_host_name: "{{ esxi_hostname }}"
        enable_maintenance_mode: true
        vsan_compliance_mode: "{{ vsan_evacuation_mode }}"
        evacuate: yes
        timeout: 3600
        validate_certs: "{{ vcenter_validate_certs }}"
      register: enter_maintenance_result
      delegate_to: localhost

    - name: Verify maintenance mode entry
      vmware.vmware.cluster_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        datacenter: "{{ vcenter_datacenter }}"
        validate_certs: "{{ vcenter_validate_certs }}"
      register: maintenance_status
      retries: 5
      delay: 10
      delegate_to: localhost

    - name: Display maintenance mode status
      debug:
        msg: "Host {{ esxi_hostname }} successfully entered maintenance mode at {{ ansible_date_time.iso8601 }}"

    - name: Wait before performing host action
      wait_for:
        timeout: "{{ host_action_delay }}"
      when: host_action != "none"
      delegate_to: localhost

    - name: Display reboot notification
      debug:
        msg:
          - "=========================================="
          - "Rebooting ESXi Host"
          - "=========================================="
          - "Host: {{ esxi_hostname }}"
          - "Action: REBOOT"
          - "Time: {{ ansible_date_time.iso8601 }}"
          - "=========================================="
      when: host_action == "reboot"

    - name: Reboot ESXi host via vCenter
      community.vmware.vmware_host_powerstate:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        state: reboot-host
        validate_certs: "{{ vcenter_validate_certs }}"
      when: host_action == "reboot"
      register: reboot_result
      delegate_to: localhost

    - name: Display shutdown notification
      debug:
        msg:
          - "=========================================="
          - "Shutting Down ESXi Host"
          - "=========================================="
          - "Host: {{ esxi_hostname }}"
          - "Action: SHUTDOWN"
          - "Time: {{ ansible_date_time.iso8601 }}"
          - "=========================================="
      when: host_action == "shutdown"

    - name: Shutdown ESXi host via vCenter
      community.vmware.vmware_host_powerstate:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        state: shutdown-host
        validate_certs: "{{ vcenter_validate_certs }}"
      when: host_action == "shutdown"
      register: shutdown_result
      delegate_to: localhost

    - name: Wait for post-maintenance delay period
      wait_for:
        timeout: "{{ post_maintenance_delay_hours | int * 3600 }}"
      when: host_action == "none"
      delegate_to: localhost

    - name: Get current epoch time (refresh for accurate calculation)
      shell: date +%s
      register: current_epoch_exit
      delegate_to: localhost
      changed_when: false

    - name: Convert exit check time to epoch
      shell: date -d "{{ exit_maintenance_datetime }}" +%s
      register: exit_check_epoch
      delegate_to: localhost
      changed_when: false

    - name: Calculate seconds until exit check time
      set_fact:
        seconds_until_exit_check: "{{ (exit_check_epoch.stdout | int) - (current_epoch_exit.stdout | int) }}"

    - name: Display exit check wait information
      debug:
        msg:
          - "=========================================="
          - "Waiting for Scheduled Exit Check Time"
          - "=========================================="
          - "Current Time: {{ lookup('pipe', 'date +\"%Y-%m-%d %H:%M:%S\"') }}"
          - "Scheduled Exit Check: {{ exit_maintenance_datetime }}"
          - "Seconds to Wait: {{ seconds_until_exit_check }}"
          - "Hours to Wait: {{ (seconds_until_exit_check | int / 3600) | round(2) }}"
          - "Minutes to Wait: {{ (seconds_until_exit_check | int / 60) | round(0) }}"
          - "{% if seconds_until_exit_check | int < 0 %}WARNING: Scheduled time has already passed!{% endif %}"
          - "=========================================="

    - name: Skip wait if time already passed
      debug:
        msg: "Scheduled exit time already passed. Proceeding immediately to SSH checks."
      when: seconds_until_exit_check | int <= 0

    - name: Wait until scheduled exit check time
      wait_for:
        timeout: "{{ seconds_until_exit_check }}"
      when: seconds_until_exit_check | int > 0
      delegate_to: localhost

    - name: Wait for host to power on (if host_action was shutdown)
      debug:
        msg:
          - "=========================================="
          - "Checking if host is powered on and accessible"
          - "=========================================="
          - "Note: If you used host_action=shutdown, power on the host manually before this time"
          - "SSH connectivity check will retry for up to {{ (ssh_check_timeout / 60) | int }} minutes"
          - "=========================================="

    - name: Add ESXi host to inventory for SSH check
      ansible.builtin.add_host:
        name: esxi_temp_host
        ansible_host: "{{ esxi_ssh_target }}"
        ansible_user: root
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
        ansible_connection: ssh

    - name: Wait for SSH connection to ESXi host
      ansible.builtin.wait_for_connection:
        delay: 30
        timeout: "{{ ssh_check_timeout }}"
        sleep: 30
        connect_timeout: 10
      delegate_to: esxi_temp_host
      register: ssh_connection_check
      ignore_errors: yes

    - name: Fail if SSH connection never became available
      fail:
        msg: |
          FAILED: SSH connection to {{ esxi_ssh_target }} did not become available within {{ (ssh_check_timeout | int / 60) | int }} minutes.

          Possible causes:
          - Host is still powered off (power it on manually if you used host_action=shutdown)
          - Host is booting (ESXi boot can take 5-10 minutes)
          - Network connectivity issue
          - SSH service not running on ESXi host
          - Firewall blocking SSH connections

          Try increasing ssh_check_timeout if host needs more time to boot.
      when: ssh_connection_check is failed

    - name: Display SSH connectivity status
      debug:
        msg: "✓ SSH connection to {{ esxi_ssh_target }} is available and responding"
      when: ssh_connection_check is succeeded

    - name: Verify host is connected in vCenter
      community.vmware.vmware_host_config_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        validate_certs: "{{ vcenter_validate_certs }}"
      register: vcenter_host_info
      retries: 10
      delay: 60
      until: vcenter_host_info is succeeded
      delegate_to: localhost

    - name: Display vCenter connection status
      debug:
        msg:
          - "Host {{ esxi_hostname }} is connected to vCenter"
          - "Host configuration retrieved successfully"

    - name: "Wait {{ (vcenter_reconnect_delay | int / 60) | int }} minutes before exiting maintenance mode"
      wait_for:
        timeout: "{{ vcenter_reconnect_delay }}"
      delegate_to: localhost

    - name: Record exit maintenance start time
      set_fact:
        exit_maintenance_start_epoch: "{{ ansible_date_time.epoch }}"
        exit_maintenance_deadline_epoch: "{{ (ansible_date_time.epoch | int) + (exit_maintenance_retry_timeout | int) }}"

    - name: Display exit maintenance retry window
      debug:
        msg:
          - "=========================================="
          - "Attempting to Exit Maintenance Mode"
          - "=========================================="
          - "Retry Window: {{ exit_maintenance_retry_timeout }} seconds ({{ (exit_maintenance_retry_timeout | int / 60) | int }} minutes)"
          - "Retry Interval: {{ exit_maintenance_retry_delay }} seconds"
          - "Deadline: {{ exit_maintenance_deadline_epoch }}"
          - "=========================================="

    - name: Exit maintenance mode via vCenter API with retries
      vmware.vmware.esxi_maintenance_mode:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_host_name: "{{ esxi_hostname }}"
        enable_maintenance_mode: false
        timeout: 3600
        validate_certs: "{{ vcenter_validate_certs }}"
      register: exit_maintenance_result
      delegate_to: localhost
      retries: "{{ (exit_maintenance_retry_timeout | int / exit_maintenance_retry_delay | int) | int }}"
      delay: "{{ exit_maintenance_retry_delay }}"
      until: exit_maintenance_result is succeeded
      failed_when: false

    - name: Display exit maintenance result
      debug:
        msg:
          - "Exit Maintenance Result: {{ 'SUCCESS' if exit_maintenance_result is succeeded else 'FAILED' }}"
          - "Attempts Made: {{ exit_maintenance_result.attempts | default(1) }}"
          - "Time Elapsed: {{ (ansible_date_time.epoch | int) - (exit_maintenance_start_epoch | int) }} seconds"

    - name: Fail if unable to exit maintenance mode
      fail:
        msg: "FAILED: Unable to exit maintenance mode after {{ exit_maintenance_retry_timeout }} seconds ({{ (exit_maintenance_retry_timeout | int / 60) | int }} minutes) of retrying."
      when: exit_maintenance_result is failed

    - name: Verify maintenance mode exit
      community.vmware.vmware_host_config_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        validate_certs: "{{ vcenter_validate_certs }}"
      register: final_status
      retries: 5
      delay: 10
      until: final_status is succeeded
      delegate_to: localhost

    - name: Display final status
      debug:
        msg: "Host {{ esxi_hostname }} successfully exited maintenance mode at {{ ansible_date_time.iso8601 }}"

    - name: Send completion notification
      debug:
        msg:
          - "=========================================="
          - "Maintenance Mode Workflow Completed"
          - "=========================================="
          - "Host: {{ esxi_hostname }}"
          - "Entered Maintenance: {{ enter_maintenance_datetime }}"
          - "Exited Maintenance: {{ ansible_date_time.iso8601 }}"
          - "Evacuation Mode Used: {{ vsan_evacuation_mode }}"
          - "Total Runtime: Check logs for duration"
